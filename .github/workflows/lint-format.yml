# workflows/lint-format.yml
#
# Lint Format
# Lint the project's file trailing spaces, line endings, and format.

name: Lint Format

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: lint-format-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint-format:
    name: Lint File Endings & Trailing Whitespaces
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Git Repository
        uses: actions/checkout@v6

      - name: Check for CRLF Files
        run: |
          FILES=$(git ls-files --eol | grep crlf || true)
          if [[ ! -z "$FILES" ]]; then
            echo "The following files have incorrect line endings:"
            echo "$FILES"
            false
          fi

      - name: Check for Trailing Whitespaces
        run: |
          FILES=$(git grep -Ilr '[[:blank:]]$' -- \
            ':(exclude)*.nix' \
            ':(exclude)*.sql' \
            ':(exclude)*.out' \
            ':(exclude)*.rs' \
            ':(exclude)docker/manifests/**' || true)
          if [[ ! -z "$FILES" ]]; then
            echo "The following files have trailing whitespaces:"
            echo "$FILES"
            exit 1
          fi

      - name: Check for Missing Final Newlines
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess
          import sys

          ignored_suffixes = {".nix", ".sql", ".out", ".rs"}
          ignored_prefixes = ("docker/manifests/",)
          missing_newline: list[str] = []

          output = subprocess.check_output(["git", "ls-files", "-z"], text=False)
          for raw_path in output.decode().split("\0"):
              if not raw_path:
                  continue
              path = Path(raw_path)
              if raw_path.startswith(ignored_prefixes) or path.suffix in ignored_suffixes:
                  continue
              data = path.read_bytes()
              if b"\0" in data:
                  continue
              if data and not data.endswith(b"\n"):
                  missing_newline.append(raw_path)

          if missing_newline:
              print("The following files are missing a trailing newline:")
              print("\n".join(missing_newline))
              sys.exit(1)
          PY
