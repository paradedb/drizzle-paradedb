# workflows/release.yml
#
# Release
# Build and publish release artifacts to GitHub Releases and npm.

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (semver, e.g., 0.1.0). Must match package.json."
        type: string
        required: true
      beta:
        description: "Mark as prerelease"
        type: boolean
        default: false
      confirmation:
        description: "I confirm version was incremented, tests pass, and CHANGELOG was updated."
        type: boolean
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build and Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Validate confirmation
        if: ${{ github.event.inputs.confirmation != 'true' }}
        run: |
          echo "❌ Please confirm the pre-release checklist"
          exit 1

      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate version
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          PACKAGE_NAME=$(node -p "require('./package.json').name")

          # Check release doesn't exist
          if gh release view "v${VERSION}" > /dev/null 2>&1; then
            echo "❌ Release v${VERSION} already exists"
            exit 1
          fi

          # Check npm package version doesn't exist
          if npm view "${PACKAGE_NAME}@${VERSION}" version > /dev/null 2>&1; then
            echo "❌ ${PACKAGE_NAME}@${VERSION} already exists on npm"
            exit 1
          fi

          # Validate beta suffix
          if [[ "${{ github.event.inputs.beta }}" == "true" && "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Beta releases must have prerelease suffix (e.g., 0.1.0-beta.1)"
            exit 1
          fi

          # Check package.json version
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [[ "${VERSION}" != "${PACKAGE_VERSION}" ]]; then
            echo "❌ package.json version (${PACKAGE_VERSION}) doesn't match ${VERSION}"
            exit 1
          fi

          echo "✅ Version validation passed"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "PACKAGE_NAME=${PACKAGE_NAME}" >> "$GITHUB_ENV"

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: |
          pnpm build
          npm pack --dry-run
          echo "✅ Package built and validated"

      - name: Determine if latest
        id: latest
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          LATEST=$(gh release list --jq '.[] | select(.isLatest == true) | .name' --json=name,isLatest | sed 's/^v//' || echo "0.0.0")
          if pnpm dlx semver -r ">${LATEST:-0.0.0}" "${VERSION}"; then
            echo "is_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ env.VERSION }}
          target_commitish: ${{ github.ref_name }}
          prerelease: ${{ github.event.inputs.beta }}
          make_latest: ${{ steps.latest.outputs.is_latest }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --access public --provenance
          echo "✅ Published ${PACKAGE_NAME} ${VERSION} to npm"

      - name: Summary
        run: |
          {
            echo "## 🚀 Released v${VERSION}"
            echo ""
            echo "- **npm**: https://www.npmjs.com/package/${PACKAGE_NAME}/v/${VERSION}"
            echo "- **Install**: \`pnpm add ${PACKAGE_NAME}@${VERSION}\`"
          } >> "$GITHUB_STEP_SUMMARY"
